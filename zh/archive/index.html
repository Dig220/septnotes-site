<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archive — Sept Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=4" />
</head>
<body class="zh-page">
  <div class="page-wrapper">
    <header class="site-header">
      <div class="masthead">
        <a href="/zh" class="back-link">← Sept Notes</a>
        <span class="dot">·</span>
        <span class="meta">档案</span>
        <a href="/archive" class="lang-switch">Switch to English</a>
      </div>
    </header>

    <main class="page archive-page">
      <section class="hero">
        <p class="section-label">限制区域</p>
        <h1 class="title">Archive</h1>
        <p class="subtitle">一个小型私人收藏。每条条目单独加密保护。</p>
      </section>

      <div id="entryList" class="entry-list"></div>
    </main>

    <footer class="page-footer outer-footer">
      <p class="colophon">一处安静的私人笔记区域。</p>
    </footer>
  </div>

  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" role="alertdialog" aria-labelledby="modalTitle" aria-describedby="modalText">
      <p class="modal-eyebrow">错误</p>
      <h2 id="modalTitle" class="modal-title">无法访问</h2>
      <p id="modalText" class="modal-text">你输入的通行短语不匹配，请重新尝试。</p>
      <button class="modal-button" id="modalDismiss" type="button">关闭</button>
    </div>
  </div>

  <script src="/content.js"></script>
  <script>
    const modalOverlay = document.getElementById("modalOverlay");
    document.getElementById("modalDismiss").addEventListener("click", closeModal);

    function showModal(title, text) {
      document.getElementById("modalTitle").textContent = title || "无法访问";
      document.getElementById("modalText").textContent = text || "你输入的通行短语不匹配，请重新尝试。";
      modalOverlay.classList.add("visible");
      modalOverlay.setAttribute("aria-hidden", "false");
      setTimeout(() => document.getElementById("modalDismiss").focus(), 50);
    }

    function closeModal() {
      modalOverlay.classList.remove("visible");
      modalOverlay.setAttribute("aria-hidden", "true");
    }

    function formatDate(ts) {
      return new Date(ts).toLocaleDateString("zh-CN", {
        year: "numeric", month: "long", day: "numeric"
      });
    }

    function formatExpiry(ts) {
      return new Date(ts).toLocaleDateString("zh-CN", {
        month: "numeric", day: "numeric", year: "numeric",
        hour: "2-digit", minute: "2-digit"
      });
    }

    function isExpired(entry) {
      return entry.expiresAt && Date.now() > entry.expiresAt;
    }

    function renderEntries() {
      const list = document.getElementById("entryList");
      const sorted = [...ENTRIES].sort((a, b) => b.publishedAt - a.publishedAt);

      if (sorted.length === 0) {
        list.innerHTML = '<p style="color:var(--ink-muted);font-style:italic;margin-top:8px;">暂无条目。</p>';
        return;
      }

      sorted.forEach((entry, idx) => {
        const expired = isExpired(entry);
        const num = String(sorted.length - idx).padStart(2, "0");

        let badgeHtml = "";
        if (entry.expiresAt) {
          badgeHtml = expired
            ? `<span class="entry-badge badge-expired">已过期</span>`
            : `<span class="entry-badge badge-active">有效 · 过期于 ${formatExpiry(entry.expiresAt)}</span>`;
        }

        const item = document.createElement("div");
        item.className = "entry-item" + (expired ? " entry-is-expired" : "");
        item.innerHTML = `
          <div class="entry-header">
            <div class="entry-meta">
              <span class="entry-num">${num}</span>
              <span class="entry-date">${formatDate(entry.publishedAt)}</span>
              ${badgeHtml}
            </div>
            <button class="entry-unlock-btn secondary-button" data-id="${entry.id}" ${expired ? "disabled" : ""}>
              ${expired ? "已过期" : "解锁 →"}
            </button>
          </div>
          <div class="entry-form hidden" id="form-${entry.id}">
            <div class="entry-input-row">
              <input type="password" class="tool-input entry-pwd"
                placeholder="输入通行短语后按 Enter"
                autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
              <button class="primary-button entry-submit" type="button">
                <span class="btn-label">解锁</span>
                <span class="btn-spinner" aria-hidden="true"></span>
              </button>
            </div>
          </div>
          <div class="entry-content hidden" id="content-${entry.id}">
            <div class="message-content"></div>
          </div>
        `;

        list.appendChild(item);

        if (!expired) {
          const toggleBtn = item.querySelector(".entry-unlock-btn");
          const form = document.getElementById(`form-${entry.id}`);
          const pwdInput = item.querySelector(".entry-pwd");
          const submitBtn = item.querySelector(".entry-submit");

          toggleBtn.addEventListener("click", () => {
            const opening = form.classList.contains("hidden");
            form.classList.toggle("hidden");
            toggleBtn.textContent = opening ? "取消" : "解锁 →";
            if (opening) pwdInput.focus();
          });

          const doDecrypt = () => handleDecrypt(entry, item, pwdInput, submitBtn, toggleBtn);
          submitBtn.addEventListener("click", doDecrypt);
          pwdInput.addEventListener("keydown", e => { if (e.key === "Enter") doDecrypt(); });
        }
      });
    }

    async function handleDecrypt(entry, item, pwdInput, submitBtn, toggleBtn) {
      const password = pwdInput.value;
      if (!password) { pwdInput.focus(); return; }
      if (submitBtn.disabled) return;

      submitBtn.classList.add("loading");
      submitBtn.disabled = true;
      await new Promise(r => setTimeout(r, 60));

      try {
        const data = Uint8Array.from(atob(entry.data), c => c.charCodeAt(0));
        const salt = data.slice(0, 16);
        const iv = data.slice(16, 28);
        const ciphertext = data.slice(28);
        const enc = new TextEncoder();

        const keyMaterial = await crypto.subtle.importKey(
          "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]
        );
        const key = await crypto.subtle.deriveKey(
          { name: "PBKDF2", salt, iterations: 200000, hash: "SHA-256" },
          keyMaterial,
          { name: "AES-GCM", length: 256 }, false, ["decrypt"]
        );
        const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);

        let text = new TextDecoder().decode(decrypted);
        if (text.startsWith("EXPIRES:")) {
          const nl = text.indexOf("\n");
          if (Date.now() > parseInt(text.slice(8, nl))) {
            showModal("条目已过期", "该条目已不再可见。");
            return;
          }
          text = text.slice(nl + 1);
        }

        const contentDiv = document.getElementById(`content-${entry.id}`);
        contentDiv.querySelector(".message-content").textContent = text;
        contentDiv.classList.remove("hidden");
        document.getElementById(`form-${entry.id}`).classList.add("hidden");
        toggleBtn.classList.add("hidden");

      } catch {
        showModal();
      } finally {
        submitBtn.classList.remove("loading");
        submitBtn.disabled = false;
      }
    }

    renderEntries();
  </script>
</body>
</html>
