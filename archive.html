<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Archive</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">
    <h1>Archive</h1>

    <div class="card">
      <input id="pwd" type="password" placeholder="Enter password">
      <button onclick="decrypt()">Unlock</button>

      <p id="output"></p>
    </div>
  </main>

  <script>
    const encryptedData = "bqfaB3HUxR8trcVQct/TcyRbcRuGFp1310zJ3+tSjysUs2Tw6AqqtaRST1Js4l0ut8GoxldOpt6uq2/dWg==";

    async function decrypt() {
      const password = document.getElementById("pwd").value;
      const output = document.getElementById("output");

      if (!password) {
        output.innerText = "Please enter a password.";
        return;
      }

      try {
        const data = Uint8Array.from(atob(encryptedData), c => c.charCodeAt(0));

        const salt = data.slice(0, 16);
        const iv = data.slice(16, 28);
        const ciphertext = data.slice(28);

        const enc = new TextEncoder();

        const keyMaterial = await crypto.subtle.importKey(
          "raw",
          enc.encode(password),
          { name: "PBKDF2" },
          false,
          ["deriveKey"]
        );

        const key = await crypto.subtle.deriveKey(
          {
            name: "PBKDF2",
            salt: salt,
            iterations: 200000,
            hash: "SHA-256"
          },
          keyMaterial,
          { name: "AES-GCM", length: 256 },
          false,
          ["decrypt"]
        );

        const decrypted = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: iv },
          key,
          ciphertext
        );

        output.innerText = new TextDecoder().decode(decrypted);
      } catch (error) {
        output.innerText = "Wrong password.";
      }
    }
  </script>
</body>
</html>
