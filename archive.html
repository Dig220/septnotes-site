<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archive — Sept Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=4" />
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <div class="masthead">
        <a href="/" class="back-link">← Sept Notes</a>
        <span class="dot">·</span>
        <span class="meta">Archive</span>
        <a href="/zh/archive" class="lang-switch">Switch to Simplified Chinese</a>
      </div>
    </header>

    <main class="page archive-page">
      <section class="hero">
        <p class="section-label">Restricted Section</p>
        <h1 class="title">Archive</h1>
        <p class="subtitle">A small private collection. Enter the passphrase to read.</p>
      </section>

      <div class="unlock-card" id="unlockCard">
        <label for="pwd" class="input-label">Passphrase</label>
        <div class="input-row">
          <input id="pwd" type="password" placeholder="Type and press Enter" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
          <button id="unlockBtn" type="button">
            <span class="btn-label">Unlock</span>
            <span class="btn-spinner" aria-hidden="true"></span>
          </button>
        </div>
      </div>

      <article class="message-card hidden" id="messageCard">
        <div class="entry-meta" style="margin-bottom: 20px;">
          <span class="entry-num" id="entryNum"></span>
          <span class="entry-date" id="entryDate"></span>
          <span class="entry-badge badge-active" id="entryBadge" style="display:none;"></span>
        </div>
        <div class="message-content" id="output"></div>
      </article>
    </main>

    <footer class="page-footer outer-footer">
      <p class="colophon">A quiet section for personal notes.</p>
    </footer>
  </div>

  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" role="alertdialog" aria-labelledby="modalTitle" aria-describedby="modalText">
      <p class="modal-eyebrow">Error</p>
      <h2 id="modalTitle" class="modal-title">Access Denied</h2>
      <p id="modalText" class="modal-text">The passphrase you entered does not match. Please try again.</p>
      <button class="modal-button" id="modalDismiss" type="button">Dismiss</button>
    </div>
  </div>

  <script>
    let ENTRIES = [];

    const pwdInput     = document.getElementById("pwd");
    const unlockBtn    = document.getElementById("unlockBtn");
    const unlockCard   = document.getElementById("unlockCard");
    const messageCard  = document.getElementById("messageCard");
    const output       = document.getElementById("output");
    const modalOverlay = document.getElementById("modalOverlay");
    const modalDismiss = document.getElementById("modalDismiss");
    async function loadEntries() {
      const response = await fetch("/api/entries", {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error("Failed to load entries.");
      }

      ENTRIES = await response.json();
    }

    unlockBtn.addEventListener("click", handleDecrypt);
    modalDismiss.addEventListener("click", closeModal);
    pwdInput.addEventListener("keydown", e => {
      if (e.key === "Enter") handleDecrypt();
    });

    function showModal(title, text) {
      document.getElementById("modalTitle").textContent = title || "Access Denied";
      document.getElementById("modalText").textContent = text || "The passphrase you entered does not match. Please try again.";
      modalOverlay.classList.add("visible");
      modalOverlay.setAttribute("aria-hidden", "false");
      setTimeout(() => modalDismiss.focus(), 50);
    }

    function closeModal() {
      modalOverlay.classList.remove("visible");
      modalOverlay.setAttribute("aria-hidden", "true");
      pwdInput.value = "";
      pwdInput.focus();
    }

    function formatDate(ts) {
      return new Date(ts).toLocaleDateString("en-US", {
        year: "numeric", month: "long", day: "numeric"
      });
    }

    function formatExpiry(ts) {
      return new Date(ts).toLocaleDateString("en-US", {
        month: "short", day: "numeric", year: "numeric",
        hour: "2-digit", minute: "2-digit"
      });
    }

    // 尝试用某个密码解一条 entry。成功返回明文（去掉过期头），过期返回 "EXPIRED"，失败返回 null
    async function tryDecryptEntry(entry, password) {
      try {
        const data = Uint8Array.from(atob(entry.data), c => c.charCodeAt(0));
        const salt = data.slice(0, 16);
        const iv = data.slice(16, 28);
        const ciphertext = data.slice(28);
        const enc = new TextEncoder();

        const keyMaterial = await crypto.subtle.importKey(
          "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]
        );
        const key = await crypto.subtle.deriveKey(
          { name: "PBKDF2", salt, iterations: 200000, hash: "SHA-256" },
          keyMaterial,
          { name: "AES-GCM", length: 256 }, false, ["decrypt"]
        );
        const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);

        let text = new TextDecoder().decode(decrypted);

        // 检查内嵌过期头
        if (text.startsWith("EXPIRES:")) {
          const nl = text.indexOf("\n");
          const expiryTs = parseInt(text.slice(8, nl));
          if (Date.now() > expiryTs) return "EXPIRED";
          text = text.slice(nl + 1);
        }
        // 检查 manifest 上的 expiresAt
        if (entry.expiresAt && Date.now() > entry.expiresAt) return "EXPIRED";

        return text;
      } catch {
        return null;  // 这个密码解不开这一条
      }
    }

    async function handleDecrypt() {
      const password = pwdInput.value;
      if (!password) { pwdInput.focus(); return; }
      if (unlockBtn.disabled) return;

      unlockBtn.classList.add("loading");
      unlockBtn.disabled = true;
      await new Promise(r => setTimeout(r, 60));

      try {
        if (!ENTRIES.length) {
            await loadEntries();
        }

        // 按时间倒序排序，让新的先被尝试
        const sorted = [...ENTRIES].sort((a, b) => b.publishedAt - a.publishedAt);
        let matchedEntry = null;
        let matchedText = null;
        let expiredHit = false;

        for (let i = 0; i < sorted.length; i++) {
          const result = await tryDecryptEntry(sorted[i], password);
          if (result === "EXPIRED") {
            expiredHit = true;
            // 不 break——继续看后面有没有未过期的同密码条目
          } else if (result !== null) {
            matchedEntry = sorted[i];
            matchedText = result;
            break;
          }
        }

        if (matchedEntry) {
          // 解出来了，显示内容和元信息
          const idx = sorted.indexOf(matchedEntry);
          const num = String(sorted.length - idx).padStart(2, "0");

          document.getElementById("entryNum").textContent = num;
          document.getElementById("entryDate").textContent = formatDate(matchedEntry.publishedAt);

          const badge = document.getElementById("entryBadge");
          if (matchedEntry.expiresAt) {
            badge.textContent = "Expires " + formatExpiry(matchedEntry.expiresAt);
            badge.style.display = "";
          } else {
            badge.style.display = "none";
          }

          output.textContent = matchedText;
          unlockCard.classList.add("hidden");
          messageCard.classList.remove("hidden");
        } else if (expiredHit) {
          showModal("Entry Expired", "This entry is no longer available.");
        } else {
          showModal();
        }
      } finally {
        unlockBtn.classList.remove("loading");
        unlockBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
