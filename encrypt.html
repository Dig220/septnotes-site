<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Encrypt Tool</title>
</head>
<body>
  <h2>Encrypt your message</h2>

  <textarea id="input" rows="10" cols="70" placeholder="Write your message..."></textarea><br><br>

  <input id="password" type="password" placeholder="Password"><br><br>

  <button onclick="encrypt()">Encrypt</button>

  <h3>Encrypted Output:</h3>
  <textarea id="output" rows="10" cols="70" readonly></textarea>

  <script>
    async function encrypt() {
      const text = document.getElementById("input").value;
      const password = document.getElementById("password").value;

      if (!text || !password) {
        alert("Please enter both message and password.");
        return;
      }

      const enc = new TextEncoder();

      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));

      const keyMaterial = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        { name: "PBKDF2" },
        false,
        ["deriveKey"]
      );

      const key = await crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt: salt,
          iterations: 200000,
          hash: "SHA-256"
        },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt"]
      );

      const encrypted = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv: iv },
        key,
        enc.encode(text)
      );

      const combined = new Uint8Array(
        salt.length + iv.length + encrypted.byteLength
      );

      combined.set(salt, 0);
      combined.set(iv, salt.length);
      combined.set(new Uint8Array(encrypted), salt.length + iv.length);

      const base64 = btoa(String.fromCharCode(...combined));
      document.getElementById("output").value = base64;
    }
  </script>
</body>
</html>
